<!DOCTYPE html>
<html lang="es">

<head>
  <!-- Configuración básica del documento -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Título mostrado en la pestaña del navegador -->
  <title>JobConnect | Login</title>

  <!-- Bootstrap 5 para diseño responsive y componentes visuales -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

  <!-- Estilos propios del proyecto -->
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body>
  <!-- =========================
       BARRA DE NAVEGACIÓN
       =========================
       Esta barra permite:
       - navegar entre las páginas principales
       - mostrar el usuario activo
       - cerrar sesión si existe un usuario logueado
  -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <!-- Nombre del proyecto -->
      <a class="navbar-brand" href="index.html">JobConnect</a>

      <!-- Botón hamburguesa para navegación en móvil -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarLogin"
        aria-controls="navbarLogin" aria-expanded="false" aria-label="Mostrar navegación">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Contenido desplegable de la navbar -->
      <div class="collapse navbar-collapse" id="navbarLogin">
        <!-- Menú principal -->
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link" href="ofertas-demandas.html">Ofertas/Demandas</a></li>
          <li class="nav-item"><a class="nav-link" href="usuarios.html">Usuarios</a></li>
        </ul>

        <!-- Zona derecha: usuario activo y botón de cerrar sesión -->
        <div class="d-flex align-items-center gap-2">
          <!-- Este texto se actualiza dinámicamente desde JavaScript -->
          <span class="navbar-text" id="usuarioActivo">Usuario activo: -no login-</span>

          <!-- Este botón empieza oculto y se muestra solo si hay sesión iniciada -->
          <button id="btn-cerrar-sesion" class="btn btn-sm btn-outline-light d-none" type="button">
            Cerrar sesión
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- =========================
       CONTENIDO PRINCIPAL
       =========================
       Esta pantalla se divide en dos columnas:
       - izquierda: formulario de login
       - derecha: estado actual de la sesión
  -->
  <main class="container py-4">

    <!-- Encabezado -->
    <section class="mb-4 text-center">
      <h1 class="h3 page-heading mb-1">Acceso a la aplicación</h1>
      <p class="page-subtitle mb-0">
        Inicio de sesión y consulta del estado actual de la sesión.
      </p>
    </section>

    <div class="row g-4">

      <!-- Columna Login -->
      <div class="col-12 col-lg-7">
        <div class="seccion-formulario h-100 login-panel">

          <h2 class="h4 mb-3 text-center">Iniciar sesión</h2>

          <form id="login-form" class="row g-3" novalidate>
            <div class="col-12">
              <label for="login-usuario" class="form-label">Usuario</label>
              <input id="login-usuario" class="form-control" type="text" required>
            </div>

            <div class="col-12">
              <label for="login-password" class="form-label">Contraseña</label>
              <input id="login-password" class="form-control" type="password" required>
            </div>

            <div class="col-12 d-flex gap-2">
              <button class="btn btn-primary" type="submit">Entrar</button>
              <button class="btn btn-outline-secondary" type="button" id="btn-logout">
                Cerrar sesión
              </button>
            </div>
          </form>

        </div>
      </div>

      <!-- Columna estado sesión -->
      <div class="col-12 col-lg-5">
        <div class="section-card h-100 session-panel">

          <h2 class="h5 mb-3">Estado de la sesión</h2>

          <p id="usuario-activo-pagina" class="mb-0">
            No hay sesión iniciada.
          </p>

        </div>
      </div>

    </div>

  </main>

  <!-- Pie de página -->
  <footer>
    <div class="container text-center">
      FULL STACK ATTACK · JobConnect · Producto 2
    </div>
  </footer>

  <!-- Bootstrap JS para navbar responsive y otros componentes -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>

  <!-- Módulo principal de esta pantalla:
       controla formulario, tabla y gráfico Canvas -->
  <script type="module" src="assets/js/int_3_empleos.js"></script>
</body>

</html>
